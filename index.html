<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LuxeNotes - Premium Personal Space</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Premium Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Plus+Jakarta+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <style>
        /* --- CORE VARIABLES & RESET --- */
        :root {
            /* Luxury Blue Palette - Elegant & Mewah */
            --bg-body: #0c1527;
            --bg-gradient: radial-gradient(ellipse at top right, #1a2a44, #0c1527);
            
            /* Glassmorphism Colors - Blue Tint */
            --glass-surface: rgba(26, 42, 68, 0.4);
            --glass-border: rgba(135, 206, 250, 0.15);
            --glass-highlight: rgba(176, 224, 230, 0.05);
            
            /* Accent Colors - Blue & Gold Harmony */
            --primary-blue: #4a90e2;
            --primary-dark-blue: #1e3a8a;
            --primary-light-blue: #60a5fa;
            --gold-primary: #d4af37; /* Tetap untuk highlights */
            --gold-hover: #f3e5ab;
            
            /* Additional Accents - Blue Variations */
            --accent-sapphire: #3b82f6;
            --accent-azure: #0ea5e9;
            --accent-turquoise: #2dd4bf;
            --accent-royal: #6366f1;
            --accent-cerulean: #1d4ed8;
            
            /* Text */
            --text-main: #f0f9ff;
            --text-muted: #bae6fd;
            --text-dark: #0c1527;
            
            /* Spacing & Effects */
            --radius-lg: 24px;
            --radius-md: 16px;
            --shadow-soft: 0 15px 50px -15px rgba(0, 0, 30, 0.7);
            --shadow-glow: 0 0 25px rgba(74, 144, 226, 0.25);
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            outline: none;
        }

        body {
            background: var(--bg-body);
            background-image: var(--bg-gradient);
            color: var(--text-main);
            font-family: 'Plus Jakarta Sans', sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Scrollbar Mewah */
        ::-webkit-scrollbar { width: 10px; }
        ::-webkit-scrollbar-track { background: rgba(0, 0, 0, 0.2); }
        ::-webkit-scrollbar-thumb { 
            background: linear-gradient(180deg, var(--primary-blue), var(--primary-dark-blue)); 
            border-radius: 10px; 
        }
        ::-webkit-scrollbar-thumb:hover { background: linear-gradient(180deg, var(--primary-light-blue), var(--primary-blue)); }

        /* --- HEADER AREA --- */
        header {
            position: sticky;
            top: 0;
            z-index: 100;
            padding: 20px 40px;
            background: rgba(12, 21, 39, 0.85);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border-bottom: 1px solid var(--glass-border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: var(--transition);
            box-shadow: 0 5px 20px rgba(0, 0, 20, 0.4);
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .brand-icon {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, var(--primary-blue), var(--primary-dark-blue));
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.5rem;
            box-shadow: var(--shadow-glow), 0 5px 15px rgba(0, 0, 0, 0.2);
            position: relative;
            overflow: hidden;
        }

        .brand-icon::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(45deg, transparent, rgba(255,255,255,0.1), transparent);
            transform: translateX(-100%);
        }

        .brand:hover .brand-icon::after {
            transform: translateX(100%);
            transition: transform 0.6s ease;
        }

        .brand h1 {
            font-family: 'Playfair Display', serif;
            font-size: 1.9rem;
            font-weight: 700;
            background: linear-gradient(90deg, #fff, var(--primary-light-blue), #bae6fd);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 0.5px;
        }

        /* Search Bar Elegant */
        .search-container {
            flex: 1;
            max-width: 600px;
            margin: 0 40px;
            position: relative;
        }

        .search-box {
            background: rgba(26, 42, 68, 0.6);
            border: 1px solid rgba(135, 206, 250, 0.2);
            border-radius: 50px;
            padding: 14px 28px;
            display: flex;
            align-items: center;
            gap: 15px;
            transition: var(--transition);
        }

        .search-box:focus-within {
            background: rgba(30, 58, 138, 0.3);
            border-color: var(--primary-blue);
            box-shadow: var(--shadow-glow);
        }

        .search-box input {
            background: transparent;
            border: none;
            color: var(--text-main);
            font-size: 1.05rem;
            width: 100%;
            font-family: inherit;
            letter-spacing: 0.3px;
        }

        .search-box input::placeholder {
            color: rgba(186, 230, 253, 0.6);
        }

        .search-box i { 
            color: var(--primary-light-blue); 
            font-size: 1.1rem;
        }

        .header-actions button {
            background: transparent;
            border: 1px solid rgba(135, 206, 250, 0.2);
            color: var(--text-main);
            width: 48px;
            height: 48px;
            border-radius: 50%;
            cursor: pointer;
            transition: var(--transition);
            margin-left: 12px;
            font-size: 1.1rem;
        }

        .header-actions button:hover {
            background: rgba(74, 144, 226, 0.15);
            border-color: var(--primary-blue);
            color: var(--primary-light-blue);
            transform: translateY(-3px) rotate(15deg);
            box-shadow: 0 5px 15px rgba(74, 144, 226, 0.2);
        }

        /* --- MAIN LAYOUT --- */
        .container {
            max-width: 1600px;
            margin: 0 auto;
            padding: 40px;
        }

        /* Stats Dashboard */
        .dashboard-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 25px;
            margin-bottom: 50px;
        }

        .stat-card {
            background: rgba(26, 42, 68, 0.5);
            border: 1px solid rgba(135, 206, 250, 0.15);
            padding: 25px;
            border-radius: var(--radius-md);
            display: flex;
            align-items: center;
            gap: 20px;
            transition: var(--transition);
            position: relative;
            overflow: hidden;
            cursor: pointer;
        }

        .stat-card:hover { 
            transform: translateY(-8px) scale(1.02); 
            background: rgba(30, 58, 138, 0.3);
            border-color: rgba(74, 144, 226, 0.3);
            box-shadow: var(--shadow-soft);
        }

        .stat-card.active {
            background: rgba(30, 58, 138, 0.4);
            border-color: rgba(74, 144, 226, 0.4);
            box-shadow: var(--shadow-glow);
            transform: translateY(-5px);
        }

        .stat-card.active::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(45deg, transparent, rgba(74, 144, 226, 0.1), transparent);
        }

        .stat-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 4px;
            height: 100%;
            background: linear-gradient(180deg, var(--primary-blue), var(--accent-turquoise));
        }

        .stat-icon {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: linear-gradient(135deg, rgba(74, 144, 226, 0.2), rgba(30, 58, 138, 0.2));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.4rem;
            border: 1px solid rgba(135, 206, 250, 0.2);
            z-index: 1;
        }

        .stat-info h3 { 
            font-size: 2.3rem; 
            font-family: 'Playfair Display', serif; 
            background: linear-gradient(90deg, var(--primary-light-blue), var(--accent-turquoise));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 1px;
        }
        .stat-info p { 
            font-size: 0.85rem; 
            color: var(--text-muted); 
            text-transform: uppercase; 
            letter-spacing: 1.5px; 
            margin-top: 5px;
        }

        /* Filter Tabs */
        .filter-wrapper {
            display: flex;
            gap: 15px;
            margin-bottom: 35px;
            overflow-x: auto;
            padding-bottom: 15px;
            scrollbar-width: none;
        }

        .filter-wrapper::-webkit-scrollbar {
            height: 5px;
        }

        .filter-wrapper::-webkit-scrollbar-thumb {
            background: rgba(74, 144, 226, 0.5);
            border-radius: 10px;
        }

        .filter-btn {
            background: transparent;
            border: 1px solid rgba(135, 206, 250, 0.15);
            color: var(--text-muted);
            padding: 12px 26px;
            border-radius: 50px;
            cursor: pointer;
            font-size: 0.95rem;
            font-weight: 500;
            transition: var(--transition);
            white-space: nowrap;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .filter-btn:hover { 
            background: rgba(74, 144, 226, 0.1); 
            color: var(--primary-light-blue); 
            border-color: rgba(74, 144, 226, 0.3);
        }
        
        .filter-btn.active {
            background: linear-gradient(90deg, var(--primary-blue), var(--accent-sapphire));
            color: white;
            border-color: transparent;
            box-shadow: var(--shadow-glow);
            font-weight: 600;
        }

        /* --- NOTES GRID (MASONRY STYLE) --- */
        .notes-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 30px;
            animation: fadeIn 0.5s ease-out;
        }

        .note-card {
            background: rgba(26, 42, 68, 0.5);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(135, 206, 250, 0.15);
            border-radius: var(--radius-lg);
            padding: 28px;
            position: relative;
            transition: var(--transition);
            cursor: pointer;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            min-height: 240px;
        }

        .note-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 5px;
            background: linear-gradient(90deg, var(--primary-blue), var(--accent-azure));
            opacity: 0.8;
        }

        .note-card:hover {
            transform: translateY(-10px);
            box-shadow: var(--shadow-soft), var(--shadow-glow);
            border-color: rgba(74, 144, 226, 0.4);
        }

        /* Category Indicators */
        .note-card[data-category="personal"]::before { background: linear-gradient(90deg, #ec4899, #db2777); }
        .note-card[data-category="kerja"]::before { background: linear-gradient(90deg, var(--accent-sapphire), var(--accent-cerulean)); }
        .note-card[data-category="ide"]::before { background: linear-gradient(90deg, var(--accent-turquoise), #10b981); }
        .note-card[data-category="penting"]::before { background: linear-gradient(90deg, var(--gold-primary), #f59e0b); }
        .note-card[data-category="umum"]::before { background: linear-gradient(90deg, var(--accent-royal), #8b5cf6); }

        .note-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 18px;
        }

        .note-title {
            font-family: 'Playfair Display', serif;
            font-size: 1.35rem;
            color: var(--text-main);
            font-weight: 600;
            line-height: 1.4;
            background: linear-gradient(90deg, #fff, var(--primary-light-blue));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .pin-icon {
            color: var(--gold-primary);
            opacity: 0;
            transform: rotate(45deg);
            transition: var(--transition);
            font-size: 1.1rem;
        }
        
        .note-card.favorite .pin-icon { 
            opacity: 1; 
            transform: rotate(0); 
            text-shadow: 0 0 10px rgba(212, 175, 55, 0.5);
        }

        .note-content {
            color: var(--text-muted);
            font-size: 1rem;
            line-height: 1.7;
            margin-bottom: 22px;
            flex-grow: 1;
            display: -webkit-box;
            -webkit-line-clamp: 5;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .note-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 22px;
        }

        .tag {
            font-size: 0.75rem;
            padding: 5px 12px;
            border-radius: 20px;
            background: rgba(74, 144, 226, 0.15);
            color: var(--primary-light-blue);
            border: 1px solid rgba(74, 144, 226, 0.3);
            transition: var(--transition);
        }

        .tag:hover {
            background: rgba(74, 144, 226, 0.25);
            transform: translateY(-2px);
        }

        .note-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 18px;
            border-top: 1px solid rgba(135, 206, 250, 0.1);
        }

        .note-date { 
            font-size: 0.8rem; 
            color: var(--text-muted); 
            font-style: italic;
        }

        .card-actions {
            display: flex;
            gap: 8px;
            opacity: 0;
            transform: translateY(10px);
            transition: var(--transition);
        }

        .note-card:hover .card-actions { opacity: 1; transform: translateY(0); }

        .action-btn {
            width: 36px; height: 36px;
            border-radius: 50%;
            border: none;
            background: rgba(74, 144, 226, 0.1);
            color: var(--primary-light-blue);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition);
        }

        .action-btn:hover { 
            background: rgba(74, 144, 226, 0.25); 
            color: white; 
            transform: scale(1.1);
        }
        
        .action-btn.delete:hover { 
            color: #f87171; 
            background: rgba(248, 113, 113, 0.15); 
        }

        /* --- FAB (FLOATING ACTION BUTTON) --- */
        .fab {
            position: fixed;
            bottom: 40px;
            right: 40px;
            width: 70px;
            height: 70px;
            background: linear-gradient(135deg, var(--primary-blue), var(--primary-dark-blue));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.7rem;
            border: none;
            cursor: pointer;
            box-shadow: var(--shadow-glow), 0 15px 30px rgba(0, 0, 30, 0.4);
            transition: var(--transition);
            z-index: 90;
            overflow: hidden;
        }

        .fab::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(45deg, transparent, rgba(255,255,255,0.2), transparent);
            transform: translateX(-100%);
        }

        .fab:hover { 
            transform: scale(1.15) rotate(90deg); 
            box-shadow: 0 0 40px rgba(74, 144, 226, 0.5); 
        }

        .fab:hover::before {
            transform: translateX(100%);
            transition: transform 0.6s ease;
        }

        /* --- MODALS --- */
        .modal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(12, 21, 39, 0.95);
            backdrop-filter: blur(15px);
            z-index: 2000;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: var(--transition);
        }

        .modal.active { opacity: 1; pointer-events: all; }

        .modal-content {
            background: rgba(26, 42, 68, 0.95);
            border: 1px solid rgba(135, 206, 250, 0.2);
            width: 90%; 
            max-width: 650px;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-soft), 0 0 50px rgba(74, 144, 226, 0.2);
            transform: translateY(60px) scale(0.95);
            transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            max-height: 90vh;
        }

        .modal.active .modal-content { 
            transform: translateY(0) scale(1); 
        }

        .modal-header {
            padding: 28px;
            border-bottom: 1px solid rgba(135, 206, 250, 0.15);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(30, 58, 138, 0.2);
        }

        .modal-header h2 { 
            font-family: 'Playfair Display', serif; 
            font-size: 1.8rem;
            background: linear-gradient(90deg, var(--primary-light-blue), var(--accent-turquoise));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .close-modal {
            background: transparent; 
            border: none; 
            color: var(--primary-light-blue);
            font-size: 1.3rem; 
            cursor: pointer; 
            transition: var(--transition);
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .close-modal:hover { 
            color: #f87171; 
            transform: rotate(90deg); 
            background: rgba(248, 113, 113, 0.1);
        }

        .modal-body { 
            padding: 28px; 
            overflow-y: auto; 
            flex-grow: 1;
        }

        .form-group { margin-bottom: 24px; }
        .form-group label { 
            display: block; 
            margin-bottom: 10px; 
            color: var(--primary-light-blue); 
            font-size: 0.95rem;
            font-weight: 500;
        }
        
        .form-control {
            width: 100%;
            padding: 16px 20px;
            background: rgba(30, 58, 138, 0.2);
            border: 1px solid rgba(135, 206, 250, 0.2);
            border-radius: 14px;
            color: var(--text-main);
            font-family: inherit;
            transition: var(--transition);
            font-size: 1rem;
        }

        .form-control:focus { 
            border-color: var(--primary-blue); 
            background: rgba(30, 58, 138, 0.3); 
            box-shadow: 0 0 0 3px rgba(74, 144, 226, 0.1);
        }

        .category-select {
            display: flex; 
            gap: 12px; 
            flex-wrap: wrap;
        }

        .cat-option {
            padding: 10px 20px;
            border-radius: 20px;
            border: 1px solid rgba(135, 206, 250, 0.2);
            cursor: pointer;
            font-size: 0.9rem;
            color: var(--text-muted);
            transition: var(--transition);
            background: rgba(30, 58, 138, 0.2);
        }

        .cat-option:hover { 
            background: rgba(74, 144, 226, 0.2); 
            color: var(--primary-light-blue);
            transform: translateY(-2px);
        }
        
        .cat-option.selected { 
            background: linear-gradient(90deg, var(--primary-blue), var(--accent-sapphire)); 
            color: white; 
            border-color: transparent; 
            font-weight: 600;
            box-shadow: 0 5px 15px rgba(74, 144, 226, 0.3);
        }

        .modal-footer {
            padding: 24px 28px;
            border-top: 1px solid rgba(135, 206, 250, 0.15);
            display: flex;
            justify-content: flex-end;
            gap: 18px;
            background: rgba(30, 58, 138, 0.2);
        }

        .btn {
            padding: 14px 28px;
            border-radius: 14px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            transition: var(--transition);
            font-size: 0.95rem;
            letter-spacing: 0.5px;
        }

        .btn-secondary { 
            background: rgba(74, 144, 226, 0.15); 
            border: 1px solid rgba(135, 206, 250, 0.2); 
            color: var(--primary-light-blue); 
        }
        .btn-secondary:hover { 
            background: rgba(74, 144, 226, 0.25); 
            color: white; 
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(74, 144, 226, 0.2);
        }
        
        .btn-primary { 
            background: linear-gradient(90deg, var(--primary-blue), var(--accent-sapphire)); 
            color: white; 
        }
        .btn-primary:hover { 
            background: linear-gradient(90deg, var(--primary-light-blue), var(--primary-blue)); 
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(74, 144, 226, 0.4); 
        }

        /* Empty State */
        .empty-state {
            grid-column: 1 / -1;
            text-align: center;
            padding: 100px 20px;
            color: var(--text-muted);
        }
        .empty-state i { 
            font-size: 5rem; 
            margin-bottom: 25px; 
            opacity: 0.5; 
            color: var(--primary-blue); 
            filter: drop-shadow(0 0 10px rgba(74, 144, 226, 0.3));
        }
        
        .empty-state h3 {
            font-size: 1.8rem;
            margin-bottom: 15px;
            background: linear-gradient(90deg, var(--primary-light-blue), var(--accent-turquoise));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 30px; 
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: rgba(26, 42, 68, 0.95);
            border: 1px solid var(--primary-blue);
            color: var(--primary-light-blue);
            padding: 18px 35px;
            border-radius: 50px;
            box-shadow: var(--shadow-glow), 0 10px 25px rgba(0, 0, 20, 0.5);
            z-index: 3000;
            display: flex; 
            align-items: center; 
            gap: 12px;
            transition: var(--transition);
            opacity: 0;
            backdrop-filter: blur(10px);
        }
        
        .toast i {
            color: var(--accent-turquoise);
            font-size: 1.2rem;
        }
        
        .toast.show { 
            transform: translateX(-50%) translateY(0); 
            opacity: 1; 
        }

        /* Responsive */
        @media (max-width: 1024px) {
            .notes-grid {
                grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            }
        }

        @media (max-width: 768px) {
            header { 
                padding: 15px 20px; 
                flex-direction: column; 
                gap: 15px; 
            }
            
            .search-container { 
                margin: 0; 
                width: 100%; 
                max-width: 100%;
            }
            
            .container { 
                padding: 25px; 
            }
            
            .brand h1 { 
                font-size: 1.6rem; 
            }
            
            .filter-wrapper { 
                padding-bottom: 15px; 
            }
            
            .dashboard-stats {
                grid-template-columns: 1fr;
                gap: 15px;
            }
            
            .fab {
                width: 60px;
                height: 60px;
                font-size: 1.5rem;
                bottom: 30px;
                right: 30px;
            }
        }

        @keyframes fadeIn { 
            from { 
                opacity: 0; 
                transform: translateY(30px); 
            } 
            to { 
                opacity: 1; 
                transform: translateY(0); 
            } 
        }
        
        /* Additional decorative elements */
        .bg-decoration {
            position: fixed;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            z-index: -1;
            overflow: hidden;
            pointer-events: none;
        }
        
        .bg-decoration::before,
        .bg-decoration::after {
            content: '';
            position: absolute;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(74, 144, 226, 0.05) 0%, transparent 70%);
        }
        
        .bg-decoration::before {
            width: 500px;
            height: 500px;
            top: -200px;
            right: -150px;
        }
        
        .bg-decoration::after {
            width: 400px;
            height: 400px;
            bottom: -150px;
            left: -100px;
        }
    </style>
</head>
<body>
    <!-- Decorative background elements -->
    <div class="bg-decoration"></div>

    <!-- Header -->
    <header>
        <div class="brand">
            <div class="brand-icon"><i class="fas fa-feather-alt"></i></div>
            <h1>CATATAN LUBIS</h1>
        </div>
        
        <div class="search-container">
            <div class="search-box">
                <i class="fas fa-search"></i>
                <input type="text" id="search-input" placeholder="Cari ide brilian Anda...">
                <button id="clear-search" style="display:none; background:none; border:none; color:var(--text-muted); cursor:pointer;"><i class="fas fa-times"></i></button>
            </div>
        </div>

        <div class="header-actions">
            <button id="refresh-btn" title="Segarkan"><i class="fas fa-sync-alt"></i></button>
        </div>
    </header>

    <div class="container">
        
        <!-- Dashboard Stats -->
        <div class="dashboard-stats">
            <div class="stat-card" id="stat-all" data-filter="all">
                <div class="stat-icon" style="color: var(--accent-azure);"><i class="fas fa-layer-group"></i></div>
                <div class="stat-info">
                    <h3 id="total-notes">0</h3>
                    <p>Total Catatan</p>
                </div>
            </div>
            <div class="stat-card" id="stat-favorites" data-filter="favorit">
                <div class="stat-icon" style="color: var(--gold-primary);"><i class="fas fa-star"></i></div>
                <div class="stat-info">
                    <h3 id="favorite-notes">0</h3>
                    <p>Favorit</p>
                </div>
            </div>
            <div class="stat-card" id="stat-today" data-filter="hari-ini">
                <div class="stat-icon" style="color: var(--accent-turquoise);"><i class="fas fa-calendar-check"></i></div>
                <div class="stat-info">
                    <h3 id="recent-notes">0</h3>
                    <p>Hari Ini</p>
                </div>
            </div>
        </div>

        <!-- Filters -->
        <div class="filter-wrapper">
            <button class="filter-btn active" data-category="all"><i class="fas fa-th-large"></i> Semua</button>
            <button class="filter-btn" data-category="personal"><i class="fas fa-user"></i> Personal</button>
            <button class="filter-btn" data-category="kerja"><i class="fas fa-briefcase"></i> Kerja</button>
            <button class="filter-btn" data-category="ide"><i class="fas fa-lightbulb"></i> Ide</button>
            <button class="filter-btn" data-category="penting"><i class="fas fa-exclamation-circle"></i> Penting</button>
            <button class="filter-btn" data-category="favorit"><i class="fas fa-star"></i> Favorit</button>
        </div>

        <!-- Notes Grid -->
        <div class="notes-grid" id="notes-container">
            <!-- Notes will be injected here -->
        </div>

    </div>

    <!-- Floating Action Button -->
    <button class="fab" id="add-note-btn">
        <i class="fas fa-plus"></i>
    </button>

    <!-- Modal Form (Add/Edit) -->
    <div class="modal" id="note-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modal-title">Tulis Catatan</h2>
                <button class="close-modal" id="close-modal-btn"><i class="fas fa-times"></i></button>
            </div>
            <div class="modal-body">
                <form id="note-form">
                    <div class="form-group">
                        <label>Judul</label>
                        <input type="text" id="note-title" class="form-control" placeholder="Judul yang menarik..." autocomplete="off">
                    </div>
                    
                    <div class="form-group">
                        <label>Kategori</label>
                        <div class="category-select" id="category-options">
                            <div class="cat-option selected" data-value="umum">Umum</div>
                            <div class="cat-option" data-value="personal">Personal</div>
                            <div class="cat-option" data-value="kerja">Kerja</div>
                            <div class="cat-option" data-value="ide">Ide</div>
                            <div class="cat-option" data-value="penting">Penting</div>
                        </div>
                        <input type="hidden" id="note-category" value="umum">
                    </div>

                    <div class="form-group">
                        <label>Tag (Pisahkan dengan koma)</label>
                        <input type="text" id="note-tags" class="form-control" placeholder="Contoh: project, 2024, prioritas">
                    </div>

                    <div class="form-group">
                        <label>Isi Catatan</label>
                        <textarea id="note-content" class="form-control" rows="6" placeholder="Tuangkan pikiran Anda di sini..." required></textarea>
                    </div>

                    <div class="form-group" style="display: flex; align-items: center; gap: 10px;">
                        <input type="checkbox" id="note-favorite" style="width: 18px; height: 18px; accent-color: var(--gold-primary);">
                        <label for="note-favorite" style="margin:0; cursor:pointer; color: var(--primary-light-blue);">Tandai sebagai Favorit</label>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" id="cancel-btn">Batal</button>
                <button class="btn btn-primary" id="save-note-btn">Simpan</button>
            </div>
        </div>
    </div>

    <!-- Modal Detail View -->
    <div class="modal" id="detail-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="detail-title" style="font-size: 1.5rem;"></h2>
                <button class="close-modal" id="close-detail-btn"><i class="fas fa-times"></i></button>
            </div>
            <div class="modal-body">
                <div id="detail-meta" style="margin-bottom: 20px; display: flex; gap: 10px; flex-wrap: wrap;"></div>
                <p id="detail-content" style="white-space: pre-wrap; line-height: 1.8; color: var(--text-main);"></p>
                <div id="detail-date" style="margin-top: 30px; font-size: 0.85rem; color: var(--text-muted); font-style: italic;"></div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" id="detail-edit-action"><i class="fas fa-edit"></i> Edit</button>
                <button class="btn btn-secondary" id="detail-delete-action" style="color: #f87171; border-color: #f87171;"><i class="fas fa-trash"></i> Hapus</button>
            </div>
        </div>
    </div>

    <!-- Toast Notification -->
    <div class="toast" id="toast">
        <i class="fas fa-check-circle"></i>
        <span id="toast-msg">Berhasil disimpan</span>
    </div>

    <script>
        // --- DATA MANAGEMENT ---
        let notes = JSON.parse(localStorage.getItem('luxe_notes')) || [];
        let currentFilter = 'all';
        let searchTerm = '';
        let editingId = null;
        let viewingId = null;
        let activeStatFilter = null; // Untuk melacak filter dari statistik

        // --- INITIALIZATION ---
        document.addEventListener('DOMContentLoaded', () => {
            if (notes.length === 0) seedData();
            renderNotes();
            updateStats();
            setupEvents();
        });

        function seedData() {
            const today = new Date().toISOString();
            const yesterday = new Date(Date.now() - 86400000).toISOString();
            
            const seeds = [
                { 
                    id: '1', 
                    title: 'Visi Perusahaan 2025', 
                    content: 'Fokus pada ekspansi pasar global dan implementasi AI dalam manajemen operasional. Target pertumbuhan 200%.', 
                    category: 'kerja', 
                    tags: ['strategi', 'bisnis', 'inovasi'], 
                    favorite: true, 
                    date: today 
                },
                { 
                    id: '2', 
                    title: 'Ide Liburan Akhir Tahun', 
                    content: '1. Swiss (Ski resort)\n2. Kyoto (Winter illumination)\n3. Raja Ampat (Diving)\n\nBudget planning harus selesai minggu depan.', 
                    category: 'personal', 
                    tags: ['travel', 'wishlist', 'liburan'], 
                    favorite: false, 
                    date: yesterday 
                },
                { 
                    id: '3', 
                    title: 'Resep Kopi Signature', 
                    content: 'Double shot espresso + 10ml vanilla syrup + oat milk + cinnamon sprinkle. Sajikan hangat dengan cookies.', 
                    category: 'ide', 
                    tags: ['kopi', 'resep', 'minuman'], 
                    favorite: true, 
                    date: today 
                },
                { 
                    id: '4', 
                    title: 'Rapat Penting dengan Klien', 
                    content: 'Presentasikan proposal baru jam 10:00. Siapkan data penjualan Q3 dan proyeksi untuk tahun depan.', 
                    category: 'penting', 
                    tags: ['meeting', 'klien', 'presentasi'], 
                    favorite: true, 
                    date: today 
                },
                { 
                    id: '5', 
                    title: 'Catatan Belanja Bulanan', 
                    content: '1. Susu almond\n2. Roti gandum\n3. Telur organik\n4. Sayuran segar\n5. Buah-buahan', 
                    category: 'personal', 
                    tags: ['belanja', 'bulanan', 'dapur'], 
                    favorite: false, 
                    date: today 
                }
            ];
            notes = seeds;
            saveToLocal();
        }

        function saveToLocal() {
            localStorage.setItem('luxe_notes', JSON.stringify(notes));
            updateStats();
        }

        // --- RENDERING ---
        function renderNotes() {
            const container = document.getElementById('notes-container');
            container.innerHTML = '';

            let filtered = notes.filter(note => {
                const matchSearch = note.title.toLowerCase().includes(searchTerm.toLowerCase()) || 
                                  note.content.toLowerCase().includes(searchTerm.toLowerCase()) ||
                                  (note.tags && note.tags.some(t => t.toLowerCase().includes(searchTerm.toLowerCase())));
                
                if (currentFilter === 'all') return matchSearch;
                if (currentFilter === 'favorit') return matchSearch && note.favorite;
                if (currentFilter === 'hari-ini') {
                    const today = new Date().toDateString();
                    const noteDate = new Date(note.date).toDateString();
                    return matchSearch && noteDate === today;
                }
                return matchSearch && note.category === currentFilter;
            });

            // Sort by Date (Newest first)
            filtered.sort((a, b) => new Date(b.date) - new Date(a.date));

            if (filtered.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-wind"></i>
                        <h3>Belum ada catatan di sini</h3>
                        <p>Mulai tulis ide brilian Anda sekarang.</p>
                    </div>
                `;
                return;
            }

            filtered.forEach(note => {
                const dateObj = new Date(note.date);
                const dateStr = dateObj.toLocaleDateString('id-ID', { day: 'numeric', month: 'short', year: 'numeric' });
                
                let tagsHtml = '';
                if (note.tags && note.tags.length) {
                    tagsHtml = note.tags.map(t => `<span class="tag">#${t}</span>`).join('');
                }

                const card = document.createElement('div');
                card.className = `note-card ${note.favorite ? 'favorite' : ''}`;
                card.dataset.category = note.category;
                card.onclick = (e) => {
                    if (!e.target.closest('.action-btn')) openDetail(note.id);
                };

                card.innerHTML = `
                    <div class="note-header">
                        <div class="note-title">${note.title || 'Tanpa Judul'}</div>
                        <i class="fas fa-thumbtack pin-icon"></i>
                    </div>
                    <div class="note-content">${note.content}</div>
                    <div class="note-tags">${tagsHtml}</div>
                    <div class="note-footer">
                        <div class="note-date">${dateStr}</div>
                        <div class="card-actions">
                            <button class="action-btn" onclick="toggleFav('${note.id}')" title="Favorit">
                                <i class="${note.favorite ? 'fas' : 'far'} fa-star" style="${note.favorite ? 'color:var(--gold-primary); text-shadow: 0 0 8px rgba(212, 175, 55, 0.5)' : ''}"></i>
                            </button>
                            <button class="action-btn" onclick="openEdit('${note.id}')" title="Edit">
                                <i class="fas fa-pen"></i>
                            </button>
                            <button class="action-btn delete" onclick="deleteNote('${note.id}')" title="Hapus">
                                <i class="fas fa-trash"></i>
                            </button>
                        </div>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function updateStats() {
            document.getElementById('total-notes').innerText = notes.length;
            document.getElementById('favorite-notes').innerText = notes.filter(n => n.favorite).length;
            
            const today = new Date().toDateString();
            const todayCount = notes.filter(n => new Date(n.date).toDateString() === today).length;
            document.getElementById('recent-notes').innerText = todayCount;
        }

        function applyFilterFromStat(statFilter) {
            // Reset semua filter button
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            
            // Reset semua stat card
            document.querySelectorAll('.stat-card').forEach(card => {
                card.classList.remove('active');
            });
            
            // Aktifkan stat card yang diklik
            const statCard = document.querySelector(`[data-filter="${statFilter}"]`);
            if (statCard) {
                statCard.classList.add('active');
            }
            
            // Aktifkan filter button yang sesuai
            if (statFilter === 'all' || statFilter === 'favorit') {
                const filterBtn = document.querySelector(`[data-category="${statFilter}"]`);
                if (filterBtn) {
                    filterBtn.classList.add('active');
                }
            }
            
            currentFilter = statFilter;
            activeStatFilter = statFilter;
            
            renderNotes();
            showToast(`Menampilkan: ${getFilterName(statFilter)}`);
        }

        function getFilterName(filter) {
            const filterNames = {
                'all': 'Semua Catatan',
                'favorit': 'Catatan Favorit',
                'hari-ini': 'Catatan Hari Ini',
                'personal': 'Personal',
                'kerja': 'Kerja',
                'ide': 'Ide',
                'penting': 'Penting'
            };
            return filterNames[filter] || filter;
        }

        // --- ACTIONS ---
        function toggleFav(id) {
            const idx = notes.findIndex(n => n.id === id);
            if (idx > -1) {
                notes[idx].favorite = !notes[idx].favorite;
                saveToLocal();
                renderNotes();
                showToast(notes[idx].favorite ? 'Ditambahkan ke Favorit' : 'Dihapus dari Favorit');
            }
        }

        function deleteNote(id) {
            if (confirm('Hapus catatan ini secara permanen?')) {
                notes = notes.filter(n => n.id !== id);
                saveToLocal();
                renderNotes();
                showToast('Catatan dihapus');
                closeDetail();
            }
        }

        function saveNote() {
            const title = document.getElementById('note-title').value;
            const content = document.getElementById('note-content').value;
            const category = document.getElementById('note-category').value;
            const tagsStr = document.getElementById('note-tags').value;
            const isFav = document.getElementById('note-favorite').checked;

            if (!content.trim()) {
                alert('Isi catatan tidak boleh kosong.');
                return;
            }

            const tags = tagsStr.split(',').map(t => t.trim()).filter(t => t);

            if (editingId) {
                const idx = notes.findIndex(n => n.id === editingId);
                notes[idx] = { ...notes[idx], title, content, category, tags, favorite: isFav, date: new Date().toISOString() };
                showToast('Perubahan disimpan');
            } else {
                const newNote = {
                    id: Date.now().toString(),
                    title, content, category, tags, favorite: isFav, date: new Date().toISOString()
                };
                notes.unshift(newNote);
                showToast('Catatan baru dibuat');
            }

            saveToLocal();
            renderNotes();
            closeModal();
        }

        // --- MODAL HANDLING ---
        const modal = document.getElementById('note-modal');
        const detailModal = document.getElementById('detail-modal');

        function openModal() {
            editingId = null;
            document.getElementById('modal-title').innerText = 'Tulis Catatan';
            document.getElementById('note-form').reset();
            setCategory('umum');
            modal.classList.add('active');
        }

        function openEdit(id) {
            editingId = id;
            const note = notes.find(n => n.id === id);
            document.getElementById('modal-title').innerText = 'Edit Catatan';
            document.getElementById('note-title').value = note.title;
            document.getElementById('note-content').value = note.content;
            document.getElementById('note-tags').value = note.tags.join(', ');
            document.getElementById('note-favorite').checked = note.favorite;
            setCategory(note.category);
            modal.classList.add('active');
        }

        function openDetail(id) {
            viewingId = id;
            const note = notes.find(n => n.id === id);
            document.getElementById('detail-title').innerText = note.title || 'Tanpa Judul';
            document.getElementById('detail-content').innerText = note.content;
            
            // Meta tags in detail
            const metaContainer = document.getElementById('detail-meta');
            let categoryColor = '';
            switch(note.category) {
                case 'kerja': categoryColor = 'var(--accent-sapphire)'; break;
                case 'personal': categoryColor = '#ec4899'; break;
                case 'ide': categoryColor = 'var(--accent-turquoise)'; break;
                case 'penting': categoryColor = 'var(--gold-primary)'; break;
                default: categoryColor = 'var(--accent-royal)';
            }
            
            metaContainer.innerHTML = `<span class="tag" style="background:${categoryColor}; color:var(--text-dark); font-weight:bold;">${note.category.toUpperCase()}</span>`;
            
            if(note.tags) note.tags.forEach(t => {
                metaContainer.innerHTML += `<span class="tag">#${t}</span>`;
            });

            const dateObj = new Date(note.date);
            document.getElementById('detail-date').innerText = `Dibuat pada: ${dateObj.toLocaleString('id-ID')}`;

            // Setup action buttons in detail modal
            document.getElementById('detail-edit-action').onclick = () => { closeDetail(); openEdit(id); };
            document.getElementById('detail-delete-action').onclick = () => { deleteNote(id); };

            detailModal.classList.add('active');
        }

        function closeModal() { modal.classList.remove('active'); }
        function closeDetail() { detailModal.classList.remove('active'); viewingId = null; }

        // --- UI HELPERS ---
        function setCategory(val) {
            document.getElementById('note-category').value = val;
            document.querySelectorAll('.cat-option').forEach(opt => {
                opt.classList.toggle('selected', opt.dataset.value === val);
            });
        }

        function showToast(msg) {
            const toast = document.getElementById('toast');
            document.getElementById('toast-msg').innerText = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        function resetFilters() {
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            document.querySelectorAll('.stat-card').forEach(card => {
                card.classList.remove('active');
            });
            
            // Aktifkan filter "Semua"
            const allFilterBtn = document.querySelector('[data-category="all"]');
            if (allFilterBtn) {
                allFilterBtn.classList.add('active');
            }
            
            currentFilter = 'all';
            activeStatFilter = null;
            renderNotes();
        }

        // --- EVENT LISTENERS ---
        function setupEvents() {
            // Add Button
            document.getElementById('add-note-btn').onclick = openModal;
            
            // Modal Buttons
            document.getElementById('close-modal-btn').onclick = closeModal;
            document.getElementById('cancel-btn').onclick = (e) => { e.preventDefault(); closeModal(); };
            document.getElementById('save-note-btn').onclick = (e) => { e.preventDefault(); saveNote(); };
            
            // Detail Modal
            document.getElementById('close-detail-btn').onclick = closeDetail;

            // Category Selection
            document.querySelectorAll('.cat-option').forEach(opt => {
                opt.onclick = () => setCategory(opt.dataset.value);
            });

            // Search
            const searchInput = document.getElementById('search-input');
            const clearBtn = document.getElementById('clear-search');
            
            searchInput.addEventListener('input', (e) => {
                searchTerm = e.target.value;
                clearBtn.style.display = searchTerm ? 'block' : 'none';
                renderNotes();
            });

            clearBtn.onclick = () => {
                searchInput.value = '';
                searchTerm = '';
                clearBtn.style.display = 'none';
                renderNotes();
            };

            // Stats Card Click Events
            document.querySelectorAll('.stat-card').forEach(card => {
                card.addEventListener('click', () => {
                    const filter = card.dataset.filter;
                    applyFilterFromStat(filter);
                });
            });

            // Filter Buttons
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    // Reset stat cards
                    document.querySelectorAll('.stat-card').forEach(card => {
                        card.classList.remove('active');
                    });
                    
                    // Reset filter buttons
                    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    
                    currentFilter = btn.dataset.category;
                    activeStatFilter = null;
                    renderNotes();
                });
            });

            // Refresh
            document.getElementById('refresh-btn').addEventListener('click', () => {
                renderNotes();
                updateStats();
                showToast('Halaman disegarkan');
            });

            // Close modal on outside click
            window.onclick = (e) => {
                if (e.target === modal) closeModal();
                if (e.target === detailModal) closeDetail();
            };

            // Reset filters when clicking brand/logo
            document.querySelector('.brand').addEventListener('click', resetFilters);
        }
    </script>
</body>
</html>
