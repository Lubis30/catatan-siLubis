<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CATATAN LUBIS // SECURE TERMINAL</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&family=VT323&display=swap" rel="stylesheet">
<style>
:root {
  --green: #00ff41;
  --green-dim: #00cc33;
  --green-dark: #003300;
  --green-glow: rgba(0,255,65,0.4);
  --cyan: #00ffff;
  --red: #ff003c;
  --amber: #ffaa00;
  --bg: #010b01;
  --panel: rgba(0,20,0,0.85);
  --border: rgba(0,255,65,0.3);
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  background: var(--bg);
  color: var(--green);
  font-family: 'Share Tech Mono', monospace;
  min-height: 100vh;
  overflow-x: hidden;
  cursor: default;
}

/* SCANLINES */
body::before {
  content:'';
  position: fixed;
  top:0; left:0; width:100%; height:100%;
  background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.15) 2px, rgba(0,0,0,0.15) 4px);
  pointer-events: none;
  z-index: 9999;
}

/* MATRIX RAIN CANVAS */
#matrix-canvas {
  position: fixed;
  top:0; left:0;
  width:100%; height:100%;
  opacity: 0.07;
  z-index: 0;
  pointer-events: none;
}

/* ===== LOGIN SCREEN ===== */
#login-screen {
  position: fixed;
  inset: 0;
  background: var(--bg);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 1000;
}

.login-logo {
  font-family: 'Orbitron', monospace;
  font-size: clamp(1.5rem, 5vw, 3rem);
  font-weight: 900;
  color: var(--green);
  text-shadow: 0 0 10px var(--green), 0 0 30px var(--green-glow), 0 0 60px var(--green-glow);
  letter-spacing: 0.3em;
  margin-bottom: 0.3em;
  animation: flicker 4s infinite;
}

.login-sub {
  font-family: 'VT323', monospace;
  font-size: 1.4rem;
  color: var(--cyan);
  letter-spacing: 0.2em;
  margin-bottom: 3rem;
  opacity: 0.8;
}

.login-box {
  background: var(--panel);
  border: 1px solid var(--green);
  border-radius: 4px;
  padding: 2.5rem 3rem;
  width: min(420px, 90vw);
  box-shadow: 0 0 30px var(--green-glow), inset 0 0 30px rgba(0,255,65,0.03);
  position: relative;
}

.login-box::before {
  content: '> SECURE_LOGIN_v2.4.1';
  position: absolute;
  top: -1px; left: 20px;
  background: var(--bg);
  color: var(--cyan);
  font-size: 0.75rem;
  padding: 0 8px;
  letter-spacing: 0.1em;
}

.login-box::after {
  content: '[ENCRYPTED]';
  position: absolute;
  bottom: -1px; right: 20px;
  background: var(--bg);
  color: var(--amber);
  font-size: 0.7rem;
  padding: 0 8px;
}

.login-label {
  font-size: 0.8rem;
  color: var(--cyan);
  letter-spacing: 0.2em;
  margin-bottom: 0.5rem;
  display: block;
}

.login-input {
  width: 100%;
  background: rgba(0,255,65,0.05);
  border: 1px solid rgba(0,255,65,0.4);
  border-radius: 2px;
  color: var(--green);
  font-family: 'Share Tech Mono', monospace;
  font-size: 1.2rem;
  padding: 0.7rem 1rem;
  letter-spacing: 0.3em;
  outline: none;
  margin-bottom: 1.5rem;
  transition: all 0.3s;
  text-align: center;
}

.login-input:focus {
  border-color: var(--green);
  box-shadow: 0 0 15px var(--green-glow);
  background: rgba(0,255,65,0.08);
}

.login-btn {
  width: 100%;
  background: transparent;
  border: 1px solid var(--green);
  color: var(--green);
  font-family: 'Orbitron', monospace;
  font-size: 0.9rem;
  font-weight: 700;
  letter-spacing: 0.3em;
  padding: 0.9rem;
  cursor: pointer;
  transition: all 0.3s;
  position: relative;
  overflow: hidden;
}

.login-btn::before {
  content: '';
  position: absolute;
  inset: 0;
  background: var(--green);
  transform: translateX(-100%);
  transition: transform 0.3s;
}

.login-btn:hover::before { transform: translateX(0); }
.login-btn:hover { color: var(--bg); }

.login-error {
  color: var(--red);
  font-size: 0.8rem;
  text-align: center;
  margin-top: 1rem;
  letter-spacing: 0.1em;
  min-height: 1.2em;
  animation: blink-err 0.5s ease;
}

.login-hint {
  font-size: 0.7rem;
  color: rgba(0,255,65,0.4);
  text-align: center;
  margin-top: 1.5rem;
  letter-spacing: 0.05em;
}

.terminal-cursor {
  display: inline-block;
  width: 10px; height: 18px;
  background: var(--green);
  margin-left: 4px;
  vertical-align: middle;
  animation: blink 1s step-end infinite;
}

/* ===== MAIN APP ===== */
#app {
  display: none;
  position: relative;
  z-index: 1;
  min-height: 100vh;
}

/* HEADER */
.hdr {
  position: sticky;
  top: 0;
  z-index: 100;
  background: rgba(1,11,1,0.95);
  border-bottom: 1px solid var(--border);
  padding: 0.8rem 1.5rem;
  display: flex;
  align-items: center;
  gap: 1.5rem;
  backdrop-filter: blur(10px);
}

.hdr-logo {
  font-family: 'Orbitron', monospace;
  font-size: 1.1rem;
  font-weight: 900;
  color: var(--green);
  text-shadow: 0 0 8px var(--green), 0 0 20px var(--green-glow);
  letter-spacing: 0.15em;
  white-space: nowrap;
  animation: flicker 6s infinite;
}

.hdr-time {
  font-size: 0.75rem;
  color: var(--cyan);
  opacity: 0.8;
  white-space: nowrap;
}

.hdr-search {
  flex: 1;
  position: relative;
}

.hdr-search input {
  width: 100%;
  background: rgba(0,255,65,0.04);
  border: 1px solid rgba(0,255,65,0.25);
  color: var(--green);
  font-family: 'Share Tech Mono', monospace;
  font-size: 0.85rem;
  padding: 0.5rem 0.5rem 0.5rem 2rem;
  outline: none;
  border-radius: 2px;
  letter-spacing: 0.05em;
  transition: all 0.3s;
}

.hdr-search input::placeholder { color: rgba(0,255,65,0.3); }
.hdr-search input:focus { border-color: var(--green); box-shadow: 0 0 10px var(--green-glow); }
.hdr-search::before { content: '>'; position:absolute; left:0.6rem; top:50%; transform:translateY(-50%); color:var(--green); opacity:0.5; }

.hdr-btns { display:flex; gap:0.5rem; }

.hdr-btn {
  background: transparent;
  border: 1px solid rgba(0,255,65,0.3);
  color: var(--green);
  font-family: 'Share Tech Mono', monospace;
  font-size: 0.75rem;
  padding: 0.4rem 0.8rem;
  cursor: pointer;
  transition: all 0.3s;
  letter-spacing: 0.05em;
  border-radius: 2px;
}
.hdr-btn:hover { background: rgba(0,255,65,0.1); border-color: var(--green); box-shadow: 0 0 8px var(--green-glow); }
.hdr-btn.danger:hover { background: rgba(255,0,60,0.1); border-color: var(--red); color: var(--red); box-shadow: 0 0 8px rgba(255,0,60,0.3); }

/* STATS BAR */
.stats-bar {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
  gap: 1px;
  background: rgba(0,255,65,0.1);
  border-bottom: 1px solid var(--border);
}

.stat-cell {
  background: var(--bg);
  padding: 0.7rem 1rem;
  cursor: pointer;
  transition: all 0.2s;
  display: flex;
  align-items: center;
  gap: 0.7rem;
  border: 1px solid transparent;
}

.stat-cell:hover, .stat-cell.active {
  background: rgba(0,255,65,0.06);
  border-color: rgba(0,255,65,0.4);
}

.stat-num {
  font-family: 'Orbitron', monospace;
  font-size: 1.5rem;
  font-weight: 700;
  color: var(--green);
  text-shadow: 0 0 10px var(--green-glow);
  line-height: 1;
}

.stat-lbl {
  font-size: 0.65rem;
  color: var(--cyan);
  letter-spacing: 0.15em;
  text-transform: uppercase;
}

/* FILTER BAR */
.filter-bar {
  padding: 0.7rem 1.5rem;
  display: flex;
  gap: 0.5rem;
  flex-wrap: wrap;
  border-bottom: 1px solid var(--border);
  background: rgba(0,5,0,0.5);
}

.f-btn {
  background: transparent;
  border: 1px solid rgba(0,255,65,0.2);
  color: rgba(0,255,65,0.5);
  font-family: 'Share Tech Mono', monospace;
  font-size: 0.75rem;
  padding: 0.3rem 0.8rem;
  cursor: pointer;
  transition: all 0.25s;
  letter-spacing: 0.08em;
  border-radius: 2px;
}
.f-btn:hover { border-color: var(--green); color: var(--green); }
.f-btn.active { border-color: var(--green); color: var(--bg); background: var(--green); box-shadow: 0 0 10px var(--green-glow); font-weight: bold; }

/* NOTES GRID */
.notes-wrap {
  padding: 1.5rem;
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(310px, 1fr));
  gap: 1rem;
}

/* NOTE CARD */
.note-card {
  background: var(--panel);
  border: 1px solid rgba(0,255,65,0.2);
  border-radius: 3px;
  padding: 1.2rem;
  cursor: pointer;
  transition: all 0.3s;
  position: relative;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  min-height: 200px;
}

.note-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 3px;
}

.note-card[data-cat="personal"]::before { background: linear-gradient(90deg, #ff0080, #ff66b2); }
.note-card[data-cat="kerja"]::before { background: linear-gradient(90deg, var(--cyan), #0088ff); }
.note-card[data-cat="ide"]::before { background: linear-gradient(90deg, var(--amber), #ff8800); }
.note-card[data-cat="penting"]::before { background: linear-gradient(90deg, var(--red), #ff6600); }
.note-card[data-cat="umum"]::before { background: linear-gradient(90deg, var(--green), var(--cyan)); }

.note-card::after {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, rgba(0,255,65,0.03), transparent);
  opacity: 0;
  transition: opacity 0.3s;
}

.note-card:hover {
  border-color: rgba(0,255,65,0.6);
  box-shadow: 0 0 20px rgba(0,255,65,0.15), inset 0 0 20px rgba(0,255,65,0.03);
  transform: translateY(-3px);
}

.note-card:hover::after { opacity: 1; }

.note-card.fav .fav-icon { opacity:1; }

.fav-icon {
  position: absolute;
  top: 0.7rem; right: 0.7rem;
  color: var(--amber);
  font-size: 0.9rem;
  opacity: 0;
  text-shadow: 0 0 8px var(--amber);
  transition: opacity 0.3s;
}

.note-id {
  font-size: 0.6rem;
  color: rgba(0,255,65,0.3);
  letter-spacing: 0.1em;
  margin-bottom: 0.4rem;
}

.note-title {
  font-family: 'Orbitron', monospace;
  font-size: 0.85rem;
  font-weight: 700;
  color: var(--green);
  text-shadow: 0 0 6px var(--green-glow);
  letter-spacing: 0.1em;
  margin-bottom: 0.6rem;
  line-height: 1.3;
}

.note-body {
  font-size: 0.78rem;
  color: rgba(0,255,65,0.65);
  line-height: 1.6;
  flex: 1;
  display: -webkit-box;
  -webkit-line-clamp: 5;
  -webkit-box-orient: vertical;
  overflow: hidden;
  margin-bottom: 0.8rem;
  letter-spacing: 0.02em;
}

.note-tags {
  display: flex;
  flex-wrap: wrap;
  gap: 0.4rem;
  margin-bottom: 0.8rem;
}

.tag {
  font-size: 0.62rem;
  padding: 0.15rem 0.5rem;
  border: 1px solid rgba(0,255,65,0.25);
  color: rgba(0,255,65,0.5);
  letter-spacing: 0.08em;
  border-radius: 2px;
}

.note-footer {
  display: flex;
  justify-content: space-between;
  align-items: center;
  border-top: 1px solid rgba(0,255,65,0.1);
  padding-top: 0.6rem;
}

.note-date { font-size: 0.65rem; color: rgba(0,255,65,0.35); }

.note-actions {
  display: flex;
  gap: 0.3rem;
  opacity: 0;
  transition: opacity 0.3s;
}
.note-card:hover .note-actions { opacity: 1; }

.act-btn {
  background: transparent;
  border: 1px solid rgba(0,255,65,0.3);
  color: var(--green);
  font-family: 'Share Tech Mono', monospace;
  font-size: 0.65rem;
  padding: 0.2rem 0.5rem;
  cursor: pointer;
  transition: all 0.2s;
  border-radius: 2px;
}
.act-btn:hover { background: rgba(0,255,65,0.15); }
.act-btn.del:hover { color: var(--red); border-color: var(--red); background: rgba(255,0,60,0.1); }
.act-btn.star:hover { color: var(--amber); border-color: var(--amber); }

/* EMPTY STATE */
.empty {
  grid-column: 1/-1;
  text-align: center;
  padding: 5rem;
  color: rgba(0,255,65,0.3);
  font-family: 'VT323', monospace;
  font-size: 1.5rem;
  letter-spacing: 0.2em;
}

/* ===== MODAL ===== */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.85);
  z-index: 500;
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.3s;
}
.modal-overlay.open { opacity:1; pointer-events:all; }

.modal {
  background: #010e01;
  border: 1px solid var(--green);
  width: min(620px, 92vw);
  max-height: 85vh;
  display: flex;
  flex-direction: column;
  box-shadow: 0 0 40px var(--green-glow);
  transform: scale(0.9) translateY(20px);
  transition: transform 0.3s;
  position: relative;
}
.modal-overlay.open .modal { transform: scale(1) translateY(0); }

.modal-hdr {
  padding: 0.8rem 1.2rem;
  border-bottom: 1px solid rgba(0,255,65,0.2);
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: rgba(0,255,65,0.03);
}

.modal-title {
  font-family: 'Orbitron', monospace;
  font-size: 0.85rem;
  color: var(--green);
  letter-spacing: 0.15em;
  text-shadow: 0 0 8px var(--green-glow);
}

.modal-close {
  background: transparent;
  border: 1px solid rgba(0,255,65,0.3);
  color: var(--green);
  width: 28px; height: 28px;
  cursor: pointer;
  font-size: 1rem;
  display: flex; align-items:center; justify-content:center;
  transition: all 0.2s;
}
.modal-close:hover { background: var(--red); border-color: var(--red); color: white; }

.modal-body { padding: 1.2rem; overflow-y: auto; flex:1; }

.form-row { margin-bottom: 1rem; }
.form-lbl { display:block; font-size:0.72rem; color:var(--cyan); letter-spacing:0.15em; margin-bottom:0.4rem; }

.form-ctrl {
  width: 100%;
  background: rgba(0,255,65,0.04);
  border: 1px solid rgba(0,255,65,0.2);
  color: var(--green);
  font-family: 'Share Tech Mono', monospace;
  font-size: 0.85rem;
  padding: 0.6rem 0.8rem;
  outline: none;
  transition: all 0.2s;
  letter-spacing: 0.03em;
  border-radius: 2px;
}
.form-ctrl:focus { border-color: var(--green); box-shadow: 0 0 8px var(--green-glow); }

.cat-row { display:flex; gap:0.5rem; flex-wrap:wrap; }
.cat-opt {
  padding: 0.3rem 0.8rem;
  border: 1px solid rgba(0,255,65,0.2);
  color: rgba(0,255,65,0.5);
  font-family: 'Share Tech Mono', monospace;
  font-size: 0.72rem;
  cursor: pointer;
  transition: all 0.2s;
  letter-spacing: 0.08em;
  border-radius: 2px;
}
.cat-opt:hover { border-color: var(--green); color: var(--green); }
.cat-opt.sel { background: rgba(0,255,65,0.15); border-color: var(--green); color: var(--green); }

.fav-row { display:flex; align-items:center; gap:0.6rem; }
.fav-check { width:16px; height:16px; accent-color: var(--amber); cursor:pointer; }

.modal-ftr {
  padding: 0.8rem 1.2rem;
  border-top: 1px solid rgba(0,255,65,0.1);
  display: flex;
  justify-content: flex-end;
  gap: 0.6rem;
  background: rgba(0,255,65,0.02);
}

.btn-cancel, .btn-save {
  font-family: 'Share Tech Mono', monospace;
  font-size: 0.8rem;
  padding: 0.5rem 1.2rem;
  cursor: pointer;
  letter-spacing: 0.1em;
  transition: all 0.2s;
  border-radius: 2px;
}

.btn-cancel {
  background: transparent;
  border: 1px solid rgba(0,255,65,0.3);
  color: rgba(0,255,65,0.6);
}
.btn-cancel:hover { border-color: var(--red); color: var(--red); }

.btn-save {
  background: rgba(0,255,65,0.1);
  border: 1px solid var(--green);
  color: var(--green);
  font-weight: bold;
}
.btn-save:hover { background: var(--green); color: var(--bg); box-shadow: 0 0 15px var(--green-glow); }

/* DETAIL MODAL */
.detail-content {
  font-size: 0.82rem;
  line-height: 1.8;
  color: rgba(0,255,65,0.8);
  white-space: pre-wrap;
  letter-spacing: 0.02em;
}

/* FAB */
.fab {
  position: fixed;
  bottom: 2rem; right: 2rem;
  width: 56px; height: 56px;
  background: transparent;
  border: 2px solid var(--green);
  color: var(--green);
  font-size: 1.8rem;
  cursor: pointer;
  display: flex; align-items:center; justify-content:center;
  transition: all 0.3s;
  z-index: 200;
  box-shadow: 0 0 15px var(--green-glow);
  clip-path: polygon(0 10%, 10% 0, 90% 0, 100% 10%, 100% 90%, 90% 100%, 10% 100%, 0 90%);
}
.fab:hover { background: var(--green); color: var(--bg); box-shadow: 0 0 30px var(--green-glow); transform: scale(1.1); }

/* TOAST */
.toast {
  position: fixed;
  bottom: 1.5rem; left: 50%;
  transform: translateX(-50%) translateY(80px);
  background: rgba(1,20,1,0.95);
  border: 1px solid var(--green);
  color: var(--green);
  font-family: 'Share Tech Mono', monospace;
  font-size: 0.82rem;
  padding: 0.7rem 1.5rem;
  letter-spacing: 0.1em;
  box-shadow: 0 0 20px var(--green-glow);
  z-index: 9000;
  opacity: 0;
  transition: all 0.4s;
}
.toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

/* STATUS BAR */
.status-bar {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  background: rgba(0,30,0,0.9);
  border-top: 1px solid rgba(0,255,65,0.2);
  padding: 0.25rem 1.5rem;
  display: flex;
  justify-content: space-between;
  font-size: 0.62rem;
  color: rgba(0,255,65,0.4);
  letter-spacing: 0.1em;
  z-index: 300;
}

.status-dot {
  display: inline-block;
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--green);
  box-shadow: 0 0 5px var(--green);
  margin-right: 0.4rem;
  animation: blink 2s ease-in-out infinite;
}

/* ANIMATIONS */
@keyframes blink {
  0%,100% { opacity:1; }
  50% { opacity:0; }
}

@keyframes flicker {
  0%,95%,97%,100% { opacity:1; }
  96%,98% { opacity:0.8; }
  96.5% { opacity:0.3; }
}

@keyframes blink-err {
  0%,100% { opacity:1; }
  25%,75% { opacity:0; }
  50% { opacity:1; }
}

@keyframes scanin {
  from { transform: translateY(-20px); opacity:0; }
  to { transform: translateY(0); opacity:1; }
}

.note-card {
  animation: scanin 0.3s ease-out both;
}

/* SCROLLBAR */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: rgba(0,255,65,0.02); }
::-webkit-scrollbar-thumb { background: rgba(0,255,65,0.25); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: rgba(0,255,65,0.5); }
</style>
</head>
<body>

<canvas id="matrix-canvas"></canvas>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-logo">CATATAN<br>LUBIS</div>
  <div class="login-sub">&gt; SECURE TERMINAL ACCESS &lt;</div>
  <div class="login-box">
    <label class="login-label">// ENTER ACCESS CODE</label>
    <input type="password" id="pin-input" class="login-input" maxlength="20" placeholder="••••••••" autocomplete="off">
    <button class="login-btn" onclick="tryLogin()">[ AUTHENTICATE ]</button>
    <div class="login-error" id="login-error"></div>
    <div class="login-hint">SYSTEM v2.4.1 // AUTHORIZED PERSONNEL ONLY<span class="terminal-cursor"></span></div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <!-- HEADER -->
  <div class="hdr">
    <div class="hdr-logo" onclick="resetFilter()" style="cursor:pointer">⬡ CATATAN_LUBIS</div>
    <div class="hdr-time" id="hdr-time"></div>
    <div class="hdr-search">
      <input type="text" id="search-inp" placeholder="search_query..." oninput="renderNotes()">
    </div>
    <div class="hdr-btns">
      <button class="hdr-btn" onclick="renderNotes()">⟳ REFRESH</button>
      <button class="hdr-btn danger" onclick="doLogout()">LOGOUT</button>

// ===== MATRIX RAIN =====
(function() {
  const canvas = document.getElementById('matrix-canvas');
  const ctx = canvas.getContext('2d');
  let cols, drops;
  const chars = 'アイウエオカキクケコサシスセソタチツテトナニヌネノ01アABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';

  function init() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    cols = Math.floor(canvas.width / 18);
    drops = Array(cols).fill(1);
  }

  function draw() {
    ctx.fillStyle = 'rgba(1,11,1,0.04)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = '#00ff41';
    ctx.font = '14px Share Tech Mono';
    drops.forEach((y, i) => {
      const c = chars[Math.floor(Math.random() * chars.length)];
      ctx.fillText(c, i * 18, y * 18);
      if (y * 18 > canvas.height && Math.random() > 0.975) drops[i] = 0;
      drops[i]++;
    });
  }

  init();
  window.addEventListener('resize', init);
  setInterval(draw, 50);
})();

function loadNotes() {
  const raw = localStorage.getItem(STORE_KEY);
  if (raw) {
    try { return JSON.parse(raw); }
    catch(e) {}
  }
  const n = JSON.parse(JSON.stringify(DEFAULT_NOTES));
  saveNotes(n);
  return n;
}

function saveNotes(arr) {
  localStorage.setItem(STORE_KEY, JSON.stringify(arr));
  updateStats();
}

let notes = [];
let curFilter = 'all';
let editId = null;

function startApp() {
  notes = loadNotes();
  updateStats();
  renderNotes();
}

// ===== STATS =====
function updateStats() {
  document.getElementById('st-total').textContent = notes.length;
  document.getElementById('st-fav').textContent = notes.filter(n=>n.favorite).length;
  const tod = new Date().toDateString();
  document.getElementById('st-today').textContent = notes.filter(n=>new Date(n.date).toDateString()===tod).length;
}

// ===== FILTER =====
function setFilter(el, cat) {
  document.querySelectorAll('.f-btn').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.stat-cell').forEach(c=>c.classList.remove('active'));
  el.classList.add('active');
  curFilter = cat;
  renderNotes();
}

function statFilter(el, f) {
  document.querySelectorAll('.stat-cell').forEach(c=>c.classList.remove('active'));
  el.classList.add('active');
  document.querySelectorAll('.f-btn').forEach(b=>b.classList.remove('active'));
  curFilter = f;
  const fb = document.querySelector(`.f-btn[data-cat="${f}"]`);
  if (fb) fb.classList.add('active');
  renderNotes();
}

function resetFilter() {
  document.querySelectorAll('.f-btn').forEach(b=>b.classList.remove('active'));
  document.querySelector('.f-btn[data-cat="all"]').classList.add('active');
  document.querySelectorAll('.stat-cell').forEach(c=>c.classList.remove('active'));
  curFilter = 'all';
  renderNotes();
}

// ===== RENDER =====
function renderNotes() {
  const q = (document.getElementById('search-inp').value||'').toLowerCase();
  let list = notes.filter(n => {
    const match = n.title.toLowerCase().includes(q) || n.content.toLowerCase().includes(q) || (n.tags||[]).some(t=>t.toLowerCase().includes(q));
    if (!match) return false;
    if (curFilter === 'all') return true;
    if (curFilter === 'favorit') return n.favorite;
    if (curFilter === 'hari-ini') return new Date(n.date).toDateString() === new Date().toDateString();
    return n.category === curFilter;
  });
  list.sort((a,b)=>new Date(b.date)-new Date(a.date));

  const grid = document.getElementById('notes-grid');
  if (!list.length) {
    grid.innerHTML = '<div class="empty">&gt; NO_DATA_FOUND // DATABASE_EMPTY &lt;</div>';
    return;
  }

  grid.innerHTML = list.map((n,i) => {
    const d = new Date(n.date);
    const ds = d.toLocaleDateString('id-ID',{day:'numeric',month:'short',year:'numeric'});
    const tags = (n.tags||[]).map(t=>`<span class="tag">#${t}</span>`).join('');
    return `
    <div class="note-card ${n.favorite?'fav':''}" data-cat="${n.category}" style="animation-delay:${i*0.05}s" onclick="openDetail('${n.id}')">
      <div class="fav-icon">★</div>
      <div class="note-id">// NODE_${n.id.slice(-6)} // ${n.category.toUpperCase()}</div>
      <div class="note-title">${escHtml(n.title)}</div>
      <div class="note-body">${escHtml(n.content)}</div>
      ${tags ? `<div class="note-tags">${tags}</div>` : ''}
      <div class="note-footer">
        <span class="note-date">${ds}</span>
        <div class="note-actions">
          <button class="act-btn star" onclick="event.stopPropagation();toggleFav('${n.id}')">★</button>
          <button class="act-btn" onclick="event.stopPropagation();openEdit('${n.id}')">EDIT</button>
          <button class="act-btn del" onclick="event.stopPropagation();delNote('${n.id}')">DEL</button>
        </div>
      </div>
    </div>`;
  }).join('');

  document.getElementById('status-msg').textContent = `${list.length}_NODES_LOADED // FILTER:${curFilter.toUpperCase()}`;
}

function escHtml(s) {
  return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ===== ACTIONS =====
function toggleFav(id) {
  const n = notes.find(x=>x.id===id);
  if (!n) return;
  n.favorite = !n.favorite;
  saveNotes(notes);
  renderNotes();
  toast(n.favorite ? '★ ADDED_TO_FAVORITES' : '★ REMOVED_FROM_FAVORITES');
}

function delNote(id) {
  if (!confirm('DELETE THIS NODE? [OK/CANCEL]')) return;
  notes = notes.filter(x=>x.id!==id);
  saveNotes(notes);
  renderNotes();
  closeModal('detail-modal');
  toast('⬡ NODE_DELETED');
}

  document.getElementById(id).classList.add('open');
}
function closeModal(id) {
  document.getElementById(id).classList.remove('open');
}

window.addEventListener('click', e => {
  ['edit-modal','detail-modal'].forEach(id => {
    if (e.target.id === id) closeModal(id);
  });
});

function openAddModal() {
  editId = null;
  document.getElementById('edit-modal-title').textContent = '// NEW_NODE';
  document.getElementById('f-title').value = '';
  document.getElementById('f-content').value = '';
  document.getElementById('f-tags').value = '';
  document.getElementById('f-fav').checked = false;
  setCatVal('umum');
  openModal('edit-modal');
}

function openEdit(id) {
  editId = id;
  const n = notes.find(x=>x.id===id);
  if (!n) return;
  document.getElementById('edit-modal-title').textContent = '// EDIT_NODE';
  document.getElementById('f-title').value = n.title;
  document.getElementById('f-content').value = n.content;
  document.getElementById('f-tags').value = (n.tags||[]).join(', ');
  document.getElementById('f-fav').checked = n.favorite;
  setCatVal(n.category);
  closeModal('detail-modal');
  openModal('edit-modal');
}

function saveNote() {
  const title = document.getElementById('f-title').value.trim();
  const content = document.getElementById('f-content').value.trim();
  const category = document.getElementById('f-cat').value;
  const tagsRaw = document.getElementById('f-tags').value;
  const fav = document.getElementById('f-fav').checked;
  if (!content) { toast('⛔ ERROR: CONTENT_REQUIRED'); return; }
  const tags = tagsRaw.split(',').map(t=>t.trim()).filter(Boolean);
  if (editId) {
    const i = notes.findIndex(x=>x.id===editId);
    if (i>-1) notes[i] = {...notes[i], title, content, category, tags, favorite:fav, date: new Date().toISOString()};
    toast('✓ NODE_UPDATED');
  } else {
    notes.unshift({id: Date.now().toString(), title, content, category, tags, favorite:fav, date: new Date().toISOString()});
    toast('✓ NODE_CREATED');
  }
  saveNotes(notes);
  renderNotes();
  closeModal('edit-modal');
}

function openDetail(id) {
  const n = notes.find(x=>x.id===id);
  if (!n) return;
  document.getElementById('d-title').textContent = '// ' + (n.title||'UNTITLED').toUpperCase();
  document.getElementById('d-content').textContent = n.content;
  const meta = document.getElementById('d-meta');
  meta.innerHTML = `<span class="tag" style="border-color:var(--cyan);color:var(--cyan)">${n.category.toUpperCase()}</span>` +
    (n.tags||[]).map(t=>`<span class="tag">#${t}</span>`).join('');
  document.getElementById('d-date').textContent = '> TIMESTAMP: ' + new Date(n.date).toLocaleString('id-ID');
  document.getElementById('d-edit-btn').onclick = () => openEdit(id);
  document.getElementById('d-del-btn').onclick = () => delNote(id);
  openModal('detail-modal');
}

function setCat(el) {
  document.querySelectorAll('.cat-opt').forEach(o=>o.classList.remove('sel'));
  el.classList.add('sel');
  document.getElementById('f-cat').value = el.dataset.v;
}

function setCatVal(val) {
  document.querySelectorAll('.cat-opt').forEach(o=>{
    o.classList.toggle('sel', o.dataset.v===val);
  });
  document.getElementById('f-cat').value = val;
}

// ===== TOAST =====
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = '> ' + msg;
  el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'), 3000);
}

// Check session
if (sessionStorage.getItem(SESSION_KEY)) {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  document.getElementById('fab-btn').style.display = 'flex';
  startApp();
}
</script>
